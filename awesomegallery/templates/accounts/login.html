<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="next" value="{{ next }}">
    <p><input type="submit" value="Login"></p>
</form>

<p>
    Don't have an account yet?
    <a href="{% url 'register' %}">Register now</a>
</p>

</body>
</html>
