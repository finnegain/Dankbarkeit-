{% extends 'base.html' %}

{% block content %}

    <button><a href="{% url 'about' %}">Über dieses Projekt</a></button>

    <h1>DANKBARKEIT</h1>

    {% if user.is_authenticated %}
        <button><a href="{% url 'upload_text' %}">Nachricht verfassen</a></button>
    {% endif %}

    {% load static %}

    <div id="sheep-container">
        {% for message in messages %}
            <div class="sheep"
                 data-id="{{ message.pk }}"
                 data-text="{{ message.text }}"
                 data-date="{{ message.created_at|date:'d.m.Y H:i' }}"
                 data-likes="{{ message.total_likes }}"
                 data-url="{% url 'like_message' message.pk %}">
            </div>
        {% endfor %}
    </div>

    <div id="message-popup">
        <button class="close-btn" id="close-popup">X</button>
        <p id="popup-text" style="margin-top: 15px; font-style: italic;"></p>
        <small id="popup-date" style="color: gray;"></small>
        <hr>
        <form id="popup-form" method="POST" action="">
            {% csrf_token %}
            <button type="submit">👍 <span id="popup-likes"></span> Likes</button>
        </form>
    </div>

    <button><a href="{% url 'archive' %}">Zum Nachrichten-Archiv</a></button>

{% endblock %}
