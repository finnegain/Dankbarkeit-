{% extends 'base.html' %}

{% block content %}
    <section id="about">
        {% include "main/about.html" %}
    </section>
    <section id="hero">
    <div class="form-container">
        <div class="form-header">
            <a href="{% url 'overview' %}" class="back-arrow"></a>
            <h2>Neuer Gedanke</h2>
        </div>
        <form method="POST" action="">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-row">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}

                    {% if field.errors %}
                        <div class="error">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
 <button id="musicsheep" type="submit">
                    <img src="{% static 'images/nomusic_sheep' %}" alt="Music">
                </button>
            <button type="submit" class="btn">Nachricht hochladen</button>
        </form>
    </div>

</section>
{% endblock %}
