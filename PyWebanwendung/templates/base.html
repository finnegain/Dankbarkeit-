<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BASE{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/default.css' %}">
    <link rel="stylesheet" href="https://use.typekit.net/cva1skl.css">
    <script src="/static/js/script.js"></script>
</head>
<body>
<header id="navbar">
    <nav>
        <div class="nav-left">
            {% if user.is_authenticated %}
                You are logged in as {{ user.username }}
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>

        <div class="nav-center">
            <a href="#about">Über das Projekt</a>
            <span>|</span>
            <a href="{% url 'archive' %}">Archiv</a>
        </div>
        <div class="nav-right">
            <a href="{% url 'about' %}">Impressum</a>
            <span>|</span>
            <a href="{% url 'archive' %}">Datenschutz</a>
        </div>
    </nav>
</header>
{% block content %}{% endblock %}
<audio id="bg-music" loop>
    <source src="{% static 'music/bubbles.mp3' %}" type="audio/mpeg">
    Dein Browser unterstützt kein Audio.
</audio>

<button id="music-toggle">🎵 Musik abspielen</button>
</body>
</html>
